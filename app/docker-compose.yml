services:
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: clubdb
      POSTGRES_USER: clubuser
      POSTGRES_PASSWORD: strongpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven-repo:/root/.m2
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/clubdb
      SPRING_DATASOURCE_USERNAME: clubuser
      SPRING_DATASOURCE_PASSWORD: strongpass

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    depends_on:
      - backend

volumes:
  maven-repo:
  postgres_data:
