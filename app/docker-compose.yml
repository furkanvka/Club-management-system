version: "3.9"

services:
  backend:
    build: ./backend
    container_name: spring-backend
    expose:
      - "8080"
    volumes:
      - ./backend:/app
      - maven-repo:/root/.m2
    working_dir: /app

  frontend:
    build: ./frontend
    container_name: react-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  maven-repo: