<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KulupYonet — Wireframe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-monospace, monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState } = React;

const W = {
  page:    "min-h-screen bg-white font-mono",
  card:    "border border-gray-300 rounded",
  input:   "w-full border border-gray-300 rounded px-3 py-2 text-xs text-gray-400 bg-white outline-none",
  label:   "block text-xs text-gray-500 mb-1 font-medium",
  btn:     "border border-gray-400 rounded px-4 py-2 text-xs text-gray-600 bg-white hover:bg-gray-50 cursor-pointer",
  btnFill: "border border-gray-800 rounded px-4 py-2 text-xs text-white bg-gray-800 hover:bg-gray-700 cursor-pointer",
  muted:   "text-gray-400",
  head:    "text-sm font-semibold text-gray-800",
  divider: "border-t border-gray-200",
  tag:     "border border-gray-300 rounded px-2 py-0.5 text-xs text-gray-500",
};

function ImgBox({ w = "w-full", h = "h-32", label }) {
  return (
    <div className={`${w} ${h} border border-gray-300 rounded bg-gray-100 relative flex items-center justify-center shrink-0`}>
      <svg className="absolute inset-0 w-full h-full" preserveAspectRatio="none">
        <line x1="0" y1="0" x2="100%" y2="100%" stroke="#d1d5db" strokeWidth="1"/>
        <line x1="100%" y1="0" x2="0" y2="100%" stroke="#d1d5db" strokeWidth="1"/>
      </svg>
      {label && <span className="relative text-xs text-gray-400 bg-gray-100 px-1">{label}</span>}
    </div>
  );
}

function TextLine({ w = "w-full", dark }) {
  return <div className={`h-2 rounded-sm ${dark ? "bg-gray-300" : "bg-gray-200"} ${w}`}/>;
}

function StatBox({ label, value }) {
  return (
    <div className="border border-gray-300 rounded p-4">
      <div className="text-gray-400 uppercase tracking-widest mb-2" style={{fontSize:"9px"}}>{label}</div>
      <div className="text-2xl font-bold text-gray-700 mb-1">{value}</div>
      <TextLine w="w-1/2"/>
    </div>
  );
}

function TableBox({ headers, rows = 4 }) {
  const cols = headers.length;
  return (
    <div className="border border-gray-300 rounded overflow-hidden">
      <div className="grid border-b border-gray-300 bg-gray-50" style={{gridTemplateColumns:`repeat(${cols},1fr)`}}>
        {headers.map(h => (
          <div key={h} className="px-3 py-2 font-bold text-gray-500 uppercase tracking-wide border-r border-gray-200 last:border-0" style={{fontSize:"9px"}}>{h}</div>
        ))}
      </div>
      {Array.from({length: rows}).map((_,i) => (
        <div key={i} className="grid border-b border-gray-100 last:border-0 hover:bg-gray-50" style={{gridTemplateColumns:`repeat(${cols},1fr)`}}>
          {headers.map((_,j) => (
            <div key={j} className="px-3 py-3 border-r border-gray-100 last:border-0 flex items-center">
              {j === 0
                ? <TextLine w="w-28" dark/>
                : j === cols-1
                  ? <span className="border border-gray-300 rounded px-2 py-0.5 text-gray-400" style={{fontSize:"10px"}}>——</span>
                  : <TextLine w="w-16"/>
              }
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

function Section({ title, action }) {
  return (
    <div className="flex items-center justify-between mb-3">
      <span className="font-bold text-gray-500 uppercase tracking-widest" style={{fontSize:"9px"}}>{title}</span>
      {action && <button className={W.btn}>{action}</button>}
    </div>
  );
}

function Field({ label, placeholder, type = "text" }) {
  return (
    <div>
      <label className={W.label}>{label}</label>
      <input type={type} placeholder={placeholder} className={W.input} readOnly/>
    </div>
  );
}

function Select({ label, options }) {
  return (
    <div>
      <label className={W.label}>{label}</label>
      <select className={W.input}>
        {options.map(o => <option key={o}>{o}</option>)}
      </select>
    </div>
  );
}

function Textarea({ label, placeholder }) {
  return (
    <div>
      <label className={W.label}>{label}</label>
      <textarea placeholder={placeholder} rows={3} className={`${W.input} resize-none`} readOnly/>
    </div>
  );
}

function UploadBox({ label }) {
  return (
    <div>
      <label className={W.label}>{label}</label>
      <div className="border-2 border-dashed border-gray-300 rounded p-6 text-center bg-gray-50 cursor-pointer hover:bg-gray-100">
        <div className="text-xs text-gray-400">[ Dosya sec veya surukle birak ]</div>
        <div className="text-gray-300 mt-1" style={{fontSize:"10px"}}>PDF, DOCX desteklenir</div>
      </div>
    </div>
  );
}

function BarChart() {
  return (
    <div className="flex items-end gap-1 h-28 pt-2">
      {[35,55,40,70,60,80,50,65,45,72,58,68].map((v,i) => (
        <div key={i} className="flex-1 border border-gray-300 bg-gray-100 rounded-sm" style={{height:`${v}%`}}/>
      ))}
    </div>
  );
}

const NAV_CONFIG = {
  uye: [
    { label: "Profilim",    items: ["Profil Goruntule", "Profil Duzenle"] },
    { label: "Etkinlikler", items: ["Duyurular", "Basvurularim"] },
    { label: "Belgeler",    items: ["Genel Belgeler"] },
  ],
  "ekip-uyesi": [
    { label: "Profilim",    items: ["Profil Goruntule", "Profil Duzenle"] },
    { label: "Gorevlerim",  items: ["Atanan Gorevler", "Durum Guncelle"] },
    { label: "Projem",      items: ["Proje Detaylari"] },
    { label: "Etkinlikler", items: ["Duyurular", "Basvurularim"] },
    { label: "Belgeler",    items: ["Proje Belgeleri", "Belge Yukle"] },
  ],
  "ekip-lideri": [
    { label: "Profilim",         items: ["Profil Goruntule", "Profil Duzenle"] },
    { label: "Ekibim",           items: ["Uye Listesi", "Uye Bilgileri"] },
    { label: "Proje & Gorevler", items: ["Proje Olustur", "Proje Detaylari", "Gorev Atama", "Gorev Ozeti"] },
    { label: "Etkinlikler",      items: ["Duyurular", "Etkinlik Detaylari", "Basvurular"] },
    { label: "Belgeler",         items: ["Yetkili Belgeler", "Belge Onay"] },
    { label: "Toplantilar",      items: ["Toplanti Raporu", "Organizasyon"] },
  ],
  baskan: [
    { label: "Profilim",          items: ["Profil Goruntule", "Profil Duzenle"] },
    { label: "Uye Yonetimi",      items: ["Uye Listesi", "Uye Gecmisi"] },
    { label: "Ekip & Lider",      items: ["Ekip Tanimla", "Lider Ata", "Flag Yonetimi"] },
    { label: "Etkinlik Yonetimi", items: ["Etkinlik Olustur", "Takvim", "Gecmis Etkinlikler"] },
    { label: "Finans",            items: ["Gelir/Gider Kaydi", "Fis Yukleme", "Finans Raporu"], flag: "F" },
    { label: "Belgeler",          items: ["Tum Belgeler", "Belge Onay", "Yedekleme"], flag: "D" },
    { label: "Sistem",            items: ["Yedekleme Periyodu"] },
  ],
  sayman: [
    { label: "Profilim",          items: ["Profil Goruntule", "Profil Duzenle"] },
    { label: "Uye Yonetimi",      items: ["Uye Listesi", "Uye Gecmisi"] },
    { label: "Ekip & Lider",      items: ["Ekip Tanimla", "Lider Ata", "Flag Yonetimi"] },
    { label: "Etkinlik Yonetimi", items: ["Etkinlik Olustur", "Takvim", "Gecmis Etkinlikler"] },
    { label: "Finans",            items: ["Gelir/Gider Kaydi", "Fis Yukleme", "Finans Raporu"], flag: "F" },
    { label: "Sistem",            items: ["Yedekleme Periyodu"] },
  ],
  sekreter: [
    { label: "Profilim",          items: ["Profil Goruntule", "Profil Duzenle"] },
    { label: "Uye Yonetimi",      items: ["Uye Listesi", "Uye Gecmisi"] },
    { label: "Ekip & Lider",      items: ["Ekip Tanimla", "Lider Ata", "Flag Yonetimi"] },
    { label: "Etkinlik Yonetimi", items: ["Etkinlik Olustur", "Takvim", "Gecmis Etkinlikler"] },
    { label: "Belgeler",          items: ["Tum Belgeler", "Belge Onay", "Yedekleme"], flag: "D" },
    { label: "Sistem",            items: ["Yedekleme Periyodu"] },
  ],
};

const ROLE_LABEL = {
  uye: "Uye", "ekip-uyesi": "Ekip Uyesi", "ekip-lideri": "Ekip Lideri",
  baskan: "Kulup Baskani", sayman: "Sayman", sekreter: "Sekreter",
};

const ROLE_FLAGS = {
  baskan: ["Yonetici","Finans","Docs"],
  sayman: ["Yonetici","Finans"],
  sekreter: ["Yonetici","Docs"],
};

function Sidebar({ role, active, onSelect }) {
  const nav = NAV_CONFIG[role] || [];
  const [open, setOpen] = useState(() => Object.fromEntries(nav.map(s => [s.label, true])));
  return (
    <aside className="w-48 border-r border-gray-300 bg-gray-50 flex flex-col shrink-0">
      <div className="px-4 py-3 border-b border-gray-300">
        <div className="text-gray-400 uppercase tracking-widest mb-0.5" style={{fontSize:"9px"}}>Kulup</div>
        <div className="text-xs font-semibold text-gray-700 truncate">IEEE Ogrenci Kolu</div>
      </div>
      <nav className="flex-1 overflow-y-auto py-2">
        {nav.map(section => (
          <div key={section.label} className="mb-0.5">
            <button onClick={() => setOpen(p => ({...p, [section.label]: !p[section.label]}))}
              className="w-full flex items-center justify-between px-3 py-1.5 hover:bg-gray-200">
              <span className="flex items-center gap-1.5 font-bold text-gray-500 uppercase tracking-widest" style={{fontSize:"9px"}}>
                {section.label}
                {section.flag && <span className="border border-gray-400 rounded px-1 font-bold text-gray-500" style={{fontSize:"8px"}}>{section.flag}</span>}
              </span>
              <span className="text-gray-400" style={{fontSize:"9px"}}>{open[section.label] ? "v" : ">"}</span>
            </button>
            {open[section.label] && (
              <div className="mb-1">
                {section.items.map(item => (
                  <button key={item} onClick={() => onSelect(item)}
                    className={`w-full text-left px-4 py-1.5 text-xs transition ${active === item ? "bg-gray-800 text-white font-medium" : "text-gray-600 hover:bg-gray-200"}`}>
                    {item}
                  </button>
                ))}
              </div>
            )}
          </div>
        ))}
      </nav>
      <div className="border-t border-gray-300 px-3 py-2.5 flex items-center gap-2">
        <div className="w-6 h-6 border border-gray-400 rounded-full bg-gray-200 shrink-0 flex items-center justify-center font-bold text-gray-500" style={{fontSize:"9px"}}>A</div>
        <div className="flex-1 min-w-0">
          <div className="text-xs font-medium text-gray-700 truncate">Ali Yilmaz</div>
          <div className="text-gray-400" style={{fontSize:"9px"}}>{ROLE_LABEL[role]}</div>
        </div>
      </div>
    </aside>
  );
}

function TopBar({ title, section, role }) {
  const flags = ROLE_FLAGS[role] || [];
  return (
    <div className="border-b border-gray-300 bg-white px-5 py-3 flex items-center justify-between shrink-0">
      <div>
        <div className="text-gray-400 mb-0.5" style={{fontSize:"10px"}}>{section} / {title}</div>
        <div className="text-sm font-semibold text-gray-800">{title}</div>
      </div>
      <div className="flex items-center gap-2">
        {flags.map(f => (
          <span key={f} className="border border-gray-400 rounded px-2 py-0.5 font-bold text-gray-500 uppercase tracking-wide" style={{fontSize:"9px"}}>{f}</span>
        ))}
        <div className="w-6 h-6 border border-gray-300 rounded-full bg-gray-100 flex items-center justify-center font-bold text-gray-500" style={{fontSize:"9px"}}>A</div>
        <span className="text-gray-400 cursor-pointer hover:text-gray-700" style={{fontSize:"10px"}}>Cikis</span>
      </div>
    </div>
  );
}

function DashLayout({ role, children }) {
  const nav = NAV_CONFIG[role] || [];
  const [active, setActive] = useState(nav[0]?.items[0]);
  const getSection = () => { for (const s of nav) if (s.items.includes(active)) return s.label; return ""; };
  return (
    <div className="flex bg-white font-mono" style={{height:"calc(100vh - 36px)"}}>
      <Sidebar role={role} active={active} onSelect={setActive}/>
      <div className="flex-1 flex flex-col overflow-hidden">
        <TopBar title={active} section={getSection()} role={role}/>
        <main className="flex-1 overflow-y-auto p-5 bg-white">{children({ active, role })}</main>
      </div>
    </div>
  );
}

function DashContent({ active, role }) {
  if (active === "Profil Goruntule") return (
    <div className="max-w-lg space-y-3">
      <Section title="Profil Bilgileri" action="Duzenle"/>
      <div className="flex items-center gap-4 border border-gray-300 rounded p-4 mb-4">
        <ImgBox w="w-14" h="h-14" label="Foto"/>
        <div className="space-y-1.5"><TextLine w="w-36" dark/><TextLine w="w-24"/></div>
      </div>
      {["Ad Soyad","E-posta","Telefon","Bolum / Sinif","Kulup Rolu","Kayit Tarihi"].map(f => (
        <div key={f} className="border border-gray-300 rounded px-4 py-3">
          <div className="text-gray-400 uppercase tracking-wide mb-1" style={{fontSize:"9px"}}>{f}</div>
          <TextLine w="w-40" dark/>
        </div>
      ))}
    </div>
  );

  if (active === "Profil Duzenle") return (
    <div className="max-w-lg space-y-4">
      <Section title="Profil Duzenle"/>
      <div className="border border-gray-300 rounded p-5 space-y-4">
        <div className="flex items-center gap-4 pb-4 border-b border-gray-200">
          <ImgBox w="w-14" h="h-14" label="Foto"/>
          <button className={W.btn}>Fotograf Degistir</button>
        </div>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Ad" placeholder="——"/><Field label="Soyad" placeholder="——"/>
        </div>
        <Field label="E-posta" placeholder="——"/>
        <Field label="Bolum" placeholder="——"/>
        <div className="flex gap-2 pt-1">
          <button className={W.btnFill}>Kaydet</button>
          <button className={W.btn}>Iptal</button>
        </div>
      </div>
    </div>
  );

  if (active === "Duyurular" || active === "Etkinlik Duyurusu") return (
    <div className="space-y-4">
      <div className="flex gap-2 mb-1">
        <input placeholder="Ara..." className={`${W.input} flex-1`} readOnly/>
        <button className={W.btn}>Filtrele</button>
      </div>
      {[1,2,3,4].map(i => (
        <div key={i} className="border border-gray-300 rounded p-4 hover:bg-gray-50">
          <div className="flex justify-between items-start mb-2">
            <TextLine w="w-48" dark/><span className={W.tag}>Yaklasan</span>
          </div>
          <TextLine w="w-full" className="mb-1.5"/><TextLine w="w-3/4"/>
          <div className="flex items-center gap-4 mt-3 pt-3 border-t border-gray-100 text-gray-400" style={{fontSize:"10px"}}>
            <span>Tarih: ——/——</span><span>Konum: ——</span><span>Kota: —/—</span>
            <button className={`${W.btnFill} ml-auto px-3 py-1.5`} style={{fontSize:"10px"}}>Basvur</button>
          </div>
        </div>
      ))}
    </div>
  );

  if (active === "Basvurularim") return (
    <div className="space-y-4"><Section title="Basvurularim"/>
      <TableBox headers={["Etkinlik","Basvuru Tarihi","Durum","Aksiyon"]} rows={4}/>
    </div>
  );

  if (["Genel Belgeler","Proje Belgeleri","Yetkili Belgeler","Tum Belgeler"].includes(active)) return (
    <div className="space-y-4">
      <div className="flex gap-2">
        <input placeholder="Ara..." className={`${W.input} flex-1`} readOnly/>
        <button className={W.btn}>Kategori</button>
        {active === "Tum Belgeler" && <button className={W.btnFill}>+ Yukle</button>}
      </div>
      <TableBox headers={["Belge Adi","Kategori","Yukleyen","Tarih","Indir"]} rows={5}/>
    </div>
  );

  if (active === "Belge Yukle") return (
    <div className="max-w-lg space-y-4"><Section title="Belge Yukle"/>
      <div className="border border-gray-300 rounded p-5 space-y-4">
        <Field label="Belge Basligi" placeholder="——"/>
        <Select label="Kategori" options={["Toplanti Raporu","Gorev Belgesi","Genel"]}/>
        <UploadBox label="Dosya Sec"/>
        <Textarea label="Aciklama (opsiyonel)" placeholder="——"/>
        <div className="flex gap-2"><button className={W.btnFill}>Yukle</button><button className={W.btn}>Iptal</button></div>
      </div>
    </div>
  );

  if (active === "Belge Onay") return (
    <div className="space-y-4"><Section title="Belge Onay Kuyrugu"/>
      <div className="border border-gray-300 rounded overflow-hidden">
        <div className="grid border-b border-gray-300 bg-gray-50" style={{gridTemplateColumns:"1fr 1fr 1fr 1fr 130px"}}>
          {["Belge","Yukleyen","Kategori","Tarih","Islem"].map(h => (
            <div key={h} className="px-3 py-2 font-bold text-gray-500 uppercase tracking-wide" style={{fontSize:"9px"}}>{h}</div>
          ))}
        </div>
        {[1,2,3].map(i => (
          <div key={i} className="grid border-b border-gray-100 last:border-0 items-center" style={{gridTemplateColumns:"1fr 1fr 1fr 1fr 130px"}}>
            <div className="px-3 py-3"><TextLine w="w-28" dark/></div>
            <div className="px-3 py-3"><TextLine w="w-20"/></div>
            <div className="px-3 py-3"><span className={W.tag}>——</span></div>
            <div className="px-3 py-3"><TextLine w="w-16"/></div>
            <div className="px-3 py-3 flex gap-1">
              <button className={`${W.btnFill} px-2 py-1`} style={{fontSize:"10px"}}>Onayla</button>
              <button className={`${W.btn} px-2 py-1`} style={{fontSize:"10px"}}>Reddet</button>
            </div>
          </div>
        ))}
      </div>
    </div>
  );

  if (active === "Atanan Gorevler") return (
    <div className="space-y-4"><Section title="Gorevlerim"/>
      <div className="grid grid-cols-3 gap-3 mb-2">
        <StatBox label="Toplam" value="12"/><StatBox label="Devam Eden" value="5"/><StatBox label="Tamamlanan" value="7"/>
      </div>
      <TableBox headers={["Gorev","Proje","Son Tarih","Durum"]} rows={5}/>
    </div>
  );

  if (active === "Durum Guncelle") return (
    <div className="max-w-lg space-y-4"><Section title="Gorev Durum Guncelle"/>
      <div className="border border-gray-300 rounded p-5 space-y-4">
        <div className="border border-gray-200 rounded p-3 bg-gray-50">
          <div className="text-gray-400 uppercase mb-1" style={{fontSize:"9px"}}>Secili Gorev</div>
          <TextLine w="w-48" dark/>
        </div>
        <div>
          <label className={W.label}>Yeni Durum</label>
          <div className="grid grid-cols-3 gap-2">
            {["Baslamadi","Devam Ediyor","Tamamlandi"].map(s => (
              <div key={s} className="border border-gray-300 rounded px-3 py-2.5 text-center text-xs text-gray-600 cursor-pointer hover:bg-gray-100">{s}</div>
            ))}
          </div>
        </div>
        <Textarea label="Not (opsiyonel)" placeholder="——"/>
        <button className={W.btnFill}>Guncelle</button>
      </div>
    </div>
  );

  if (active === "Gorev Atama") return (
    <div className="max-w-lg space-y-4"><Section title="Gorev Ata"/>
      <div className="border border-gray-300 rounded p-5 space-y-4">
        <Field label="Gorev Basligi" placeholder="——"/>
        <Select label="Atanacak Uye" options={["Uye Sec","Ali Yilmaz","Fatma Koc","Ahmet Demir"]}/>
        <Select label="Proje / Etkinlik" options={["Sec","Proje A","Etkinlik B"]}/>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Son Tarih" placeholder="gg/aa/yyyy"/>
          <Select label="Oncelik" options={["Normal","Yuksek","Kritik"]}/>
        </div>
        <Textarea label="Aciklama" placeholder="——"/>
        <div className="flex gap-2"><button className={W.btnFill}>Gorevi Ata</button><button className={W.btn}>Iptal</button></div>
      </div>
    </div>
  );

  if (active === "Gorev Ozeti") return (
    <div className="space-y-4">
      <div className="grid grid-cols-4 gap-3">
        <StatBox label="Toplam" value="24"/><StatBox label="Bekleyen" value="6"/>
        <StatBox label="Devam" value="10"/><StatBox label="Bitti" value="8"/>
      </div>
      <Section title="Ekip Gorev Listesi"/>
      <TableBox headers={["Gorev","Atanan","Son Tarih","Durum","Ilerleme"]} rows={6}/>
    </div>
  );

  if (active === "Proje Olustur") return (
    <div className="max-w-lg space-y-4"><Section title="Proje Olustur"/>
      <div className="border border-gray-300 rounded p-5 space-y-4">
        <Field label="Proje Adi" placeholder="——"/>
        <Textarea label="Aciklama" placeholder="——"/>
        <div className="grid grid-cols-2 gap-3">
          <Field label="Baslangic Tarihi" placeholder="gg/aa/yyyy"/>
          <Field label="Bitis Tarihi" placeholder="gg/aa/yyyy"/>
        </div>
        <Select label="Oncelik" options={["Normal","Yuksek","Kritik"]}/>
        <div className="flex gap-2 pt-1"><button className={W.btnFill}>Proje Olustur</button><button className={W.btn}>Iptal</button></div>
      </div>
    </div>
  );

  if (active === "Proje Detaylari") return (
    <div className="space-y-4 max-w-2xl"><Section title="Proje Detaylari"/>
      <div className="border border-gray-300 rounded p-5 space-y-4">
        <div className="grid grid-cols-2 gap-4">
          {["Proje Adi","Durum","Baslangic Tarihi","Bitis Tarihi","Ekip Lideri","Uye Sayisi"].map(f => (
            <div key={f}>
              <div className="text-gray-400 uppercase tracking-wide mb-1" style={{fontSize:"9px"}}>{f}</div>
              <TextLine w="w-32" dark/>
            </div>
          ))}
        </div>
        <div className="border-t border-gray-200 pt-4">
          <div className="text-gray-400 uppercase tracking-wide mb-2" style={{fontSize:"9px"}}>Ilerleme</div>
          <div className="w-full h-3 border border-gray-300 rounded-full overflow-hidden bg-gray-100">

        <div className="mt-4 border border-gray-400 rounded px-4 py-3 bg-gray-50 text-gray-600" style={{fontSize:"10px"}}>
          ! Hesabiniz sistem yoneticisi onaylayana kadar pasif kalacaktir.
        </div>
      </div>
    </div>
  );
}

function PageClubSelect() {
  return (
    <div className="min-h-screen bg-gray-50 flex items-center justify-center font-mono">
      <div className="w-full max-w-xs">
        <div className="text-center mb-6">
          <h1 className="text-base font-bold text-gray-800">Kulup Sec</h1>
          <p className="text-xs text-gray-400 mt-1">Devam etmek istediginiz kulubu secin.</p>
        </div>
        <div className="space-y-2">
          {[{name:"IEEE Ogrenci Kolu",role:"Ekip Lideri"},{name:"Yapay Zeka Kulubu",role:"Uye"}].map((c,i) => (
            <button key={i} className="w-full text-left border border-gray-300 rounded p-4 bg-white hover:bg-gray-50 hover:border-gray-500 transition">
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-sm font-medium text-gray-800">{c.name}</div>
                  <div className="text-gray-400 mt-0.5" style={{fontSize:"10px"}}>{c.role}</div>
                </div>
                <span className="text-gray-400 text-xs">&gt;</span>
              </div>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

const PAGES = [
  { id:"landing",          label:"01  Landing" },
  { id:"club-detail",      label:"02  Kulup Detay" },
  { id:"signin",           label:"03  Giris Yap" },
  { id:"club-reg",         label:"04  Kulup Kaydi" },
  { id:"club-select",      label:"05  Kulup Sec" },
  { id:"dash-uye",         label:"06  Uye" },
  { id:"dash-ekip-uyesi",  label:"07  Ekip Uyesi" },
  { id:"dash-ekip-lideri", label:"08  Ekip Lideri" },
  { id:"dash-baskan",      label:"09  Baskan" },
  { id:"dash-sayman",      label:"10  Sayman" },
  { id:"dash-sekreter",    label:"11  Sekreter" },
];

const DASH_ROLES = {
  "dash-uye":          "uye",
  "dash-ekip-uyesi":   "ekip-uyesi",
  "dash-ekip-lideri":  "ekip-lideri",
  "dash-baskan":       "baskan",
  "dash-sayman":       "sayman",
  "dash-sekreter":     "sekreter",
};

function App() {
  const [page, setPage] = useState("landing");
  return (
    <div className="font-mono">
      <div className="fixed top-0 left-0 right-0 z-50 border-b border-gray-400 bg-white flex items-center overflow-x-auto" style={{height:"36px"}}>
        <span className="px-3 font-bold uppercase tracking-widest text-gray-500 shrink-0 border-r border-gray-300 h-full flex items-center" style={{fontSize:"9px"}}>WIREFRAME</span>
        {PAGES.map(p => (
          <button key={p.id} onClick={() => setPage(p.id)}
            className={`px-3 h-full whitespace-nowrap shrink-0 border-b-2 transition ${page === p.id ? "border-gray-800 text-gray-800 font-bold bg-gray-50" : "border-transparent text-gray-400 hover:text-gray-700 hover:bg-gray-50"}`}
            style={{fontSize:"10px"}}>
            {p.label}
          </button>
        ))}
      </div>
      <div style={{paddingTop:"36px"}}>
        {page === "landing"     && <PageLanding/>}
        {page === "club-detail" && <PageClubDetail/>}
        {page === "signin"      && <PageSignIn/>}
        {page === "club-reg"    && <PageClubReg/>}
        {page === "club-select" && <PageClubSelect/>}
        {Object.entries(DASH_ROLES).map(([pid, role]) =>
          page === pid ? (
            <DashLayout key={pid} role={role}>
              {({ active }) => <DashContent active={active} role={role}/>}
            </DashLayout>
          ) : null
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
